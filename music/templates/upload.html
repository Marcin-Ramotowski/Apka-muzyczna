{% extends 'start.html' %}
{% load crispy_forms_tags %}

{% block content %}
<h2>Dodaj piosenkę</h2>
<div class="w3-panel" style="max-width:520px">
    <form enctype="multipart/form-data" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <input class="w3-button submit-button" type="submit" value="Prześlij">
    </form>
</div>
{% endblock %}
