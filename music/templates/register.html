{% extends 'start.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="middle_form">
    <h2>Zarejestruj się</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <input class="w3-button" type="submit" value="Zarejestruj">
    </form>
    <p style="margin-top:16px">Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a>.</p>
</div>
{% endblock %}
