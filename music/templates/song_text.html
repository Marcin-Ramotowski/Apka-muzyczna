{% extends 'start.html' %}
{% load static %}

{% block content %}
<h2>{{ song }}</h2>
<div class="w3-panel" style="max-width:600px">
    <audio controls class="audio-controller" data-song-id="{{ song.utwor_id }}">
        <source src="{{ song.get_play_url }}" type="audio/mpeg">
    </audio>
</div>
<div class="w3-panel" style="max-width:600px;line-height:1.8">
    {% for line in text %}
        <div class="w3-hover-teal">{{ line }}</div>
    {% endfor %}
</div>
{% endblock %}
