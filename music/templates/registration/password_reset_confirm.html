{% extends 'start.html' %}
{% block content %}
<h2>Ustaw nowe hasło</h2>
{% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input class="w3-button w3-blue" type="submit" value="Zmień hasło">
    </form>
{% else %}
    <div class="w3-panel w3-red">
        <p>Link wygasł lub jest nieprawidłowy. <a href="{% url 'password_reset' %}">Spróbuj ponownie.</a></p>
    </div>
{% endif %}
{% endblock %}
