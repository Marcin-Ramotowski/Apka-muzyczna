{% extends 'start.html' %}

{% block content %}
<h2>Reset hasła</h2>
<p class="w3-text-gray">Podaj adres e-mail powiązany z kontem. Wyślemy link do ustawienia nowego hasła.</p>
<div class="w3-panel" style="max-width:440px">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display:flex;gap:8px;margin-top:8px">
            <input class="w3-button w3-blue" type="submit" value="Wyślij link resetujący">
            <a class="w3-button w3-grey" href="{% url 'music:profile' %}">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
