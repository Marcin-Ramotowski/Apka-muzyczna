{% extends 'start.html' %}
{% block content %}
<h2>Reset hasła</h2>
<p>Podaj adres email powiązany z Twoim kontem. Wyślemy link do ustawienia nowego hasła.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input class="w3-button w3-blue" type="submit" value="Wyślij link resetujący">
    <a class="w3-button w3-light-grey" href="{% url 'music:profile' %}">Anuluj</a>
</form>
{% endblock %}
