{% extends 'start.html' %}

{% block content %}
<h2>Tekst piosenki: {{ song.tytul }}</h2>
<p class="w3-text-gray">Autor: {{ song.autor }}</p>
<div class="w3-panel" style="max-width:520px">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display:flex;gap:8px;margin-top:8px">
            <input class="w3-button w3-purple" type="submit" value="Zapisz tekst">
            <a class="w3-button w3-grey" href="{% url 'music:profile' %}">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
